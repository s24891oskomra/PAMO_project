---
# iOS Keychain sheet after login — not part of the app UI, so text match may fail.
- tapOn:
    text: "Not Now"
    optional: true
- tapOn:
    text: "Nie teraz"
    optional: true

# Fallback when Maestro cannot read the system sheet labels (common on iOS).
- runFlow:
    when:
      visible: "Save Password"
    commands:
      - tapOn:
          point: "50%,72%"
- runFlow:
    when:
      visible: "Zapisz hasło"
    commands:
      - tapOn:
          point: "50%,72%"
