appId: pl.zwierzapp.app
---
- launchApp

- extendedWaitUntil:
    visible: "Pulpit"
    timeout: 20000

- tapOn:
    id: "tab-walks"
- tapOn:
    id: "add-walk-button"

- extendedWaitUntil:
    visible: "Rozpocznij spacer"
    timeout: 10000

- tapOn: "kira"

- tapOn: "Rozpocznij spacer"

- extendedWaitUntil:
    visible: "Oczekujące"
    timeout: 15000

- tapOn:
    id: "walks-tab-mine"
- extendedWaitUntil:
    visible: "Trwa"
    timeout: 15000

- tapOn: "Zakończ"
- extendedWaitUntil:
    notVisible: "Trwa"
    timeout: 15000
