appId: pl.zwierzapp.app
---
- launchApp

- extendedWaitUntil:
    visible:
      id: "screen-home"
    timeout: 20000

- tapOn:
    id: "tab-walks"
- tapOn:
    id: "add-walk-button"

- extendedWaitUntil:
    visible:
      id: "create-walk-start"
    timeout: 10000

- tapOn:
    id: ${WALK_DOG_TEST_ID}

- tapOn:
    id: "create-walk-start"

- extendedWaitUntil:
    visible:
      id: "walks-tab-waiting"
    timeout: 15000

- tapOn:
    id: "walks-tab-mine"
- extendedWaitUntil:
    visible:
      id: "walk-ongoing-badge"
    timeout: 15000

- tapOn:
    id: "walk-end-button"
- extendedWaitUntil:
    notVisible:
      id: "walk-ongoing-badge"
    timeout: 15000
