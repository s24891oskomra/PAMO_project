appId: pl.zwierzapp.app
---
- launchApp:
    clearState: true

- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 20000

- tapOn:
    id: "login-email"
- inputText: ${LOGIN_EMAIL}

- tapOn:
    id: "login-password"
- inputText: ${LOGIN_PASSWORD}

- hideKeyboard

- tapOn:
    id: "login-submit"

- runFlow:
    file: subflows/dismiss-ios-save-password.yaml

- extendedWaitUntil:
    visible:
      id: "screen-home"
    timeout: 20000

- assertNotVisible:
    id: "screen-login"
- assertVisible:
    id: "dashboard-stat-waiting"
- assertVisible:
    id: "dashboard-stat-animals"
