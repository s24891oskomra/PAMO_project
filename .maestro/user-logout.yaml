appId: pl.zwierzapp.app
---
- launchApp

- extendedWaitUntil:
    visible:
      id: "screen-home"
    timeout: 20000

- tapOn:
    id: "tab-profile"
- extendedWaitUntil:
    visible:
      id: "profile-email"
    timeout: 10000

- tapOn:
    id: "logout-button"

- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 15000

- launchApp
- extendedWaitUntil:
    visible:
      id: "screen-login"
    timeout: 20000
- assertNotVisible:
    id: "screen-home"
